<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e053d">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Activation Snap Plus</title>
    <style>
        /* --- STYLE GÉNÉRAL --- */
        html, body {
            background-color: #0d011a;
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 1. SYSTÈME D'AUTHENTIFICATION --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top, #1e053d 0%, #0d011a 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.5s ease;
        }

        .glass-panel {
            width: 85%; max-width: 320px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 35px; padding: 40px 25px; text-align: center;
            border: 2px solid rgba(204, 51, 255, 0.3);
            box-shadow: 0 0 40px rgba(204, 51, 255, 0.2);
        }

        .login-title { font-size: 23px; font-weight: 900; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase; background: linear-gradient(to right, #cc33ff, #ff0080); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .login-input-group { background: rgba(0, 0, 0, 0.3); border-radius: 50px; margin-bottom: 15px; padding: 5px 20px; display: flex; align-items: center; border: 1.5px solid rgba(255, 0, 128, 0.3); }

        .login-input-group input { background: transparent; border: none; color: white; padding: 15px 0; width: 100%; outline: none; font-size: 16px; }

        .btn-login { width: 100%; background: linear-gradient(135deg, #cc33ff, #ff0080); border: none; border-radius: 50px; padding: 18px; color: white; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-top: 15px; }

        .btn-guest { background: transparent; border: none; color: rgba(255, 255, 255, 0.5); margin-top: 20px; font-size: 14px; cursor: pointer; text-decoration: underline; width: 100%; }

        /* --- POPUP RESTRICTION --- */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 20000; }
        .popup-box { background: #1e053d; padding: 30px; border-radius: 25px; text-align: center; border: 2px solid #cc33ff; width: 80%; max-width: 300px; }

        /* --- CONTENU PRINCIPAL --- */
        #main-site { display: none; opacity: 0; transition: opacity 0.8s ease; }
        .container { width: 100%; max-width: 380px; padding: 60px 20px; text-align: center; margin: 0 auto; box-sizing: border-box; }
        
        /* ... Le reste de votre CSS reste identique ... */
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="glass-panel">
            <h2 class="login-title">Connexion Administrateur</h2>
            
            <div class="login-input-group">
                <input type="text" id="adminUser" placeholder="Identifiant">
            </div>

            <div class="login-input-group">
                <input type="password" id="adminPass" placeholder="Mot de passe">
            </div>

            <button class="btn-login" onclick="checkLogin()">SE CONNECTER</button>
            <button class="btn-guest" onclick="enterAsGuest()">Continuer en tant qu'invité</button>
        </div>
    </div>

    <div id="main-site">
        </div>

    <script>
        let isGuest = false;

        function enterAsGuest() {
            isGuest = true;
            document.getElementById('login-overlay').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = "none";
                document.getElementById('main-site').style.display = "block";
                setTimeout(() => { document.getElementById('main-site').style.opacity = "1"; }, 50);
            }, 500);
        }

        // Interception des clics sur les inputs en mode invité
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('focus', (e) => {
                    if (isGuest) {
                        e.target.blur(); // Retire le focus pour empêcher le clavier
                        showPaywallPopup();
                    }
                });
            });
        });

        function showPaywallPopup() {
            const div = document.createElement('div');
            div.className = 'popup-overlay';
            div.innerHTML = `
                <div class="popup-box">
                    <h3 style="color:#cc33ff">Accès Restreint</h3>
                    <p>Pour débloquer les permissions et valider votre compte, vous devez procéder à l'activation complète (Paiement requis).</p>
                    <button class="btn-login" onclick="this.parentElement.parentElement.remove()">Compris</button>
                </div>
            `;
            document.body.appendChild(div);
        }

        // ... Vos autres fonctions (checkLogin, etc.) restent ici ...
    </script>
</body>
</html>
